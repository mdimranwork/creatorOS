<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>AI Command + Approval System</p>

<hr>

<input id="cmd" type="text" placeholder="Type command..." style="width:300px;height:30px;">

<br><br>

<button onclick="generate()">Generate</button>

<hr>

<h3>Preview Panel</h3>

<div id="preview" style="border:1px solid #000;padding:10px;min-height:60px;">
No preview yet
</div>

<br>

<button onclick="approve()">Approve</button>
<button onclick="reject()">Reject</button>

<hr>

<h3>Status</h3>

<div id="status">Waiting...</div>

<script>

let currentTask = "";

function generate() {

let cmd = document.getElementById("cmd").value;
let preview = document.getElementById("preview");
let status = document.getElementById("status");

currentTask = cmd;

if(cmd.includes("poster")) {
preview.innerHTML = "🎨 Poster Design Ready<br>Concept: Modern Cinematic Style<br>Caption: High Impact Branding Post";
}

else if(cmd.includes("publish")) {
preview.innerHTML = "🚀 Social Media Campaign Ready<br>FB + IG + LinkedIn + Portfolio update prepared";
}

else if(cmd.includes("article")) {
preview.innerHTML = "📝 SEO Article Draft Ready<br>Topic optimized, structure prepared";
}

else {
preview.innerHTML = "⚠️ Unknown task - basic draft created";
}

status.innerHTML = "Preview Generated - Waiting for approval";
}

function approve() {
document.getElementById("status").innerHTML =
"✅ Approved - Executing: " + currentTask;
}

function reject() {
document.getElementById("status").innerHTML =
"❌ Rejected - Task cancelled";
document.getElementById("preview").innerHTML = "No preview yet";
}

</script>

</body>

  </html>
