<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>Memory + Client Style System</p>

<hr>

<input id="client" type="text" placeholder="Client name..." style="width:200px;">
<br><br>

<input id="cmd" type="text" placeholder="Type command..." style="width:300px;">

<br><br>

<button onclick="generate()">Generate</button>

<hr>

<h3>Memory Log</h3>

<div id="memory" style="border:1px solid #000;padding:10px;min-height:80px;">
No memory yet
</div>

<hr>

<h3>Portfolio</h3>

<div id="portfolio" style="border:1px solid #000;padding:10px;min-height:80px;">
Empty
</div>

<br>

<button onclick="approve()">Approve & Save</button>

<hr>

<h3>Status</h3>

<div id="status">Idle</div>

<script>

let currentProject = "";
let memoryDB = [];

function generate() {

let client = document.getElementById("client").value;
let cmd = document.getElementById("cmd").value;

currentProject = cmd;

let memoryText = "Client: " + client + " | Command: " + cmd;

document.getElementById("status").innerHTML =
"Generated for " + client;

}

function approve() {

let client = document.getElementById("client").value;

memoryDB.push({
client: client,
project: currentProject
});

updateMemory();
updatePortfolio();

document.getElementById("status").innerHTML =
"Saved to memory + portfolio";
}

function updateMemory() {

let memoryDiv = document.getElementById("memory");

memoryDiv.innerHTML = "";

for(let i=0;i<memoryDB.length;i++) {

memoryDiv.innerHTML +=
"<div>🧠 " + memoryDB[i].client + " → " + memoryDB[i].project + "</div>";

}

}

function updatePortfolio() {

let portfolio = document.getElementById("portfolio");

portfolio.innerHTML = "";

for(let i=0;i<memoryDB.length;i++) {

portfolio.innerHTML +=
"<div style='border:1px solid gray;margin:5px;padding:5px;'>🎨 "
+ memoryDB[i].project + "</div>";

}

}

</script>

</body>

  </html>
