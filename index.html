<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>Social Media AI Engine</p>

<hr>

<input id="cmd" type="text" placeholder="Type command..." style="width:300px;height:30px;">

<br><br>

<button onclick="generate()">Generate Content</button>

<hr>

<h3>Multi-Platform Preview</h3>

<div id="fb" style="border:1px solid #000;padding:10px;margin:5px;">
Facebook: Waiting...
</div>

<div id="ig" style="border:1px solid #000;padding:10px;margin:5px;">
Instagram: Waiting...
</div>

<div id="ln" style="border:1px solid #000;padding:10px;margin:5px;">
LinkedIn: Waiting...
</div>

<div id="bh" style="border:1px solid #000;padding:10px;margin:5px;">
Behance: Waiting...
</div>

<br>

<button onclick="approve()">Approve All</button>

<hr>

<h3>Status</h3>

<div id="status">Idle</div>

<script>

function generate() {

let cmd = document.getElementById("cmd").value;

document.getElementById("fb").innerHTML =
"📘 FB Post:<br>🔥 " + cmd + " campaign launched!";

document.getElementById("ig").innerHTML =
"📸 IG Caption:<br>✨ Stylish version of: " + cmd;

document.getElementById("ln").innerHTML =
"💼 LinkedIn Post:<br>Professional update: " + cmd;

document.getElementById("bh").innerHTML =
"🎨 Behance Case:<br>Design story: " + cmd;

document.getElementById("status").innerHTML =
"Preview generated - waiting approval";
}

function approve() {

document.getElementById("status").innerHTML =
"🚀 Published to all platforms (simulated)";

}

</script>

</body>

</html>
