<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>Automation Workflow Engine</p>

<hr>

<input id="cmd" type="text" placeholder="Type command..." style="width:350px;height:30px;">

<br><br>

<button onclick="runWorkflow()">Run Workflow</button>

<hr>

<h3>Workflow Steps</h3>

<div id="flow" style="border:1px solid #000;padding:10px;min-height:120px;">
Waiting for workflow...
</div>

<hr>

<h3>Status</h3>

<div id="status">Idle</div>

<script>

function runWorkflow() {

let cmd = document.getElementById("cmd").value.toLowerCase();

let flow = document.getElementById("flow");
let status = document.getElementById("status");

let steps = [];

if(cmd.includes("poster")) {

steps = [
"🎨 Step 1: Generate design concept",
"🧠 Step 2: Create AI visual idea",
"✍️ Step 3: Write caption",
"📱 Step 4: Create FB/IG/LinkedIn posts",
"📁 Step 5: Save to portfolio",
"🚀 Step 6: Add to publish queue"
];

}

else if(cmd.includes("publish")) {

steps = [
"📦 Step 1: Prepare content package",
"📘 Step 2: Facebook format",
"📸 Step 3: Instagram format",
"💼 Step 4: LinkedIn format",
"🌐 Step 5: Update website portfolio",
"🚀 Step 6: Publish simulation complete"
];

}

else if(cmd.includes("client")) {

steps = [
"👤 Step 1: Identify client",
"📂 Step 2: Load client history",
"💬 Step 3: Generate response",
"📊 Step 4: Suggest next action",
"📩 Step 5: Prepare follow-up message"
];

}

else {

steps = [
"🧠 Step 1: Analyze input",
"❓ Step 2: Unknown command detected",
"⚙️ Step 3: Request clarification"
];

}

flow.innerHTML = "";

for(let i=0;i<steps.length;i++) {
flow.innerHTML += "<div>" + steps[i] + "</div><br>";
}

status.innerHTML = "Workflow executed (simulation mode)";
}

</script>

</body>

</html>
