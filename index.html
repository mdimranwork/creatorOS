<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>AI Powered Command System</p>

<hr>

<input id="cmd" type="text" placeholder="Type command..." style="width:300px;height:30px;">

<br><br>

<button onclick="runCommand()">Run</button>

<hr>

<h3>AI Output</h3>

<div id="output" style="border:1px solid #000;padding:10px;min-height:50px;">
Waiting for command...
</div>

<script>

function runCommand() {

let cmd = document.getElementById("cmd").value;
let output = document.getElementById("output");

if(cmd.includes("poster")) {
output.innerHTML = "🧠 AI: Poster design workflow started...<br>→ Creating concept<br>→ Generating caption<br>→ Preparing social posts";
}

else if(cmd.includes("publish")) {
output.innerHTML = "🚀 AI: Publishing process started...<br>→ Facebook<br>→ Instagram<br>→ LinkedIn<br>→ Portfolio updated";
}

else if(cmd.includes("article")) {
output.innerHTML = "📝 AI: SEO Article generation started...<br>→ Topic analysis<br>→ Writing draft<br>→ Optimizing SEO";
}

else {
output.innerHTML = "⚠️ AI: Command understood but no workflow found.<br>Try: poster / publish / article";
}

}

</script>

</body>

</html>
