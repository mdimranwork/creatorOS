<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>Portfolio Auto Builder System</p>

<hr>

<input id="cmd" type="text" placeholder="Type command..." style="width:300px;height:30px;">

<br><br>

<button onclick="generate()">Generate Project</button>

<hr>

<h3>Live Portfolio</h3>

<div id="portfolio" style="border:1px solid #000;padding:10px;min-height:80px;">
No projects yet
</div>

<br>

<button onclick="approve()">Approve & Add to Portfolio</button>

<hr>

<h3>Status</h3>

<div id="status">Waiting...</div>

<script>

let currentProject = "";

function generate() {

let cmd = document.getElementById("cmd").value;

currentProject = cmd;

document.getElementById("status").innerHTML =
"Project generated - waiting approval";

document.getElementById("status").innerHTML =
"Preview ready: " + cmd;

}

function approve() {

let portfolio = document.getElementById("portfolio");

portfolio.innerHTML +=
"<div style='border:1px solid gray;margin:5px;padding:5px;'>🎨 " 
+ currentProject + "</div>";

document.getElementById("status").innerHTML =
"✅ Added to portfolio & saved";

}

</script>

</body>

                   </html>
