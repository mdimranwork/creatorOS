<!DOCTYPE html>
<html>

<head>
<title>Creator OS</title>
</head>

<body>

<h1>Creator OS</h1>
<p>Smart AI Command Brain</p>

<hr>

<input id="cmd" type="text" placeholder="Type anything..." style="width:350px;height:30px;">

<br><br>

<button onclick="runBrain()">Run AI</button>

<hr>

<h3>AI Understanding</h3>

<div id="brain" style="border:1px solid #000;padding:10px;min-height:60px;">
Waiting for input...
</div>

<hr>

<h3>Execution Plan</h3>

<div id="plan" style="border:1px solid #000;padding:10px;min-height:80px;">
No plan yet
</div>

<script>

function runBrain() {

let cmd = document.getElementById("cmd").value.toLowerCase();

let brain = document.getElementById("brain");
let plan = document.getElementById("plan");

let intent = "";

if(cmd.includes("poster") || cmd.includes("design")) {
intent = "DESIGN_TASK";
}

else if(cmd.includes("post") || cmd.includes("publish")) {
intent = "SOCIAL_MEDIA_TASK";
}

else if(cmd.includes("article") || cmd.includes("blog")) {
intent = "CONTENT_TASK";
}

else if(cmd.includes("client") || cmd.includes("follow")) {
intent = "CLIENT_TASK";
}

else {
intent = "GENERAL_TASK";
}

brain.innerHTML =
"🧠 Detected Intent: <b>" + intent + "</b>";

if(intent == "DESIGN_TASK") {
plan.innerHTML =
"1. Create design concept<br>2. Generate visual idea<br>3. Prepare caption<br>4. Save to portfolio";
}

else if(intent == "SOCIAL_MEDIA_TASK") {
plan.innerHTML =
"1. Create post variants<br>2. FB + IG + LinkedIn format<br>3. Schedule content<br>4. Request approval";
}

else if(intent == "CONTENT_TASK") {
plan.innerHTML =
"1. Research topic<br>2. Write SEO article<br>3. Optimize structure<br>4. Prepare publish";
}

else if(intent == "CLIENT_TASK") {
plan.innerHTML =
"1. Identify client<br>2. Check history<br>3. Prepare response<br>4. Follow-up action";
}

else {
plan.innerHTML =
"1. Analyze input<br>2. Ask clarification<br>3. Create basic task plan";
}

}

</script>

</body>

</html>
